name: fulldev_compose
services:
  frontend:
    build: ../frontend
    ports:
      - "3000:80"
  
  # When frontend will be on NextJ this must be used instead of one up there
  #frontend:
  #image: node:20
  #working_dir: /app
  #volumes:
  #  - ../frontend:/app
  #command: npm run dev
  #ports:
  #  - "3000:3000"

  gateway:
    build: ../apigateway
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - project

  auth:
    build: ../auth_service
    container_name: auth
    volumes:
      - ../auth_service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "8000"

  project:
    build: ../project_service
    container_name: project
    volumes:
      - ../project_service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "8000"

