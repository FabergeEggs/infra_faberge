name: faberge_latest_compose

x-service-defaults: &service-defaults
  pull_policy: always
  expose:
    - "8000"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres:
    image: postgres:16-alpine
    container_name: faberge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faberge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faberge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-faberge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/01-init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faberge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - faberge_network

  redis:
    image: redis:7-alpine
    container_name: faberge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - faberge_network

  minio:
    image: minio/minio:latest
    container_name: faberge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faberge_network

  minio-init:
    image: minio/mc:latest
    container_name: faberge-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
      mc mb "local/$$MEDIA_S3_BUCKET" --ignore-existing
    networks:
      - faberge_network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: faberge-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-faberge}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-faberge_dev}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-import:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 30
    networks:
      - faberge_network

  auth:
    <<: *service-defaults
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest}
    container_name: auth
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-service}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-auth-service}
    ports:
      - "8001:8000"
    networks:
      - faberge_network

networks:
  faberge_network:
    driver: bridge

volumes:
  postgres_data:
    # external: false — создаётся автоматически, данные сохраняются
  redis_data:
  minio_data:
  keycloak_data: