name: faberge_latest_compose

services:
  # PostgreSQL для основного приложения
  postgres:
    image: postgres:16-alpine
    container_name: faberge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faberge
      POSTGRES_USER: faberge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faberge_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faberge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: faberge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: faberge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: faberge-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
      mc mb local/media --ignore-existing
    networks:
      - faberge_network

  # PostgreSQL для Keycloak (как в вашем рабочем docker-compose)
  postgres_keycloak:
    image: postgres:15-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak (как в вашем рабочем docker-compose)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres_keycloak
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8080"  # Изменяем порт, чтобы не конфликтовать
    depends_on:
      postgres_keycloak:
        condition: service_healthy
    volumes:
      - ../auth_service/keycloak-export:/opt/keycloak/data/import:ro  # Путь к вашей папке с экспортом
      - keycloak_data:/opt/keycloak/data
    networks:
      - faberge_network

  # Auth Service (как в вашем рабочем docker-compose)
  auth_service:
    build: ../auth_service
    container_name: auth_service
    restart: unless-stopped
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-service}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-nmeYwMzWRHuLb7V5iCnF9T8vQ2TlW3af}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-auth-service}
    ports:
      - "8001:8000"  # Изменяем порт, чтобы не конфликтовать
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ../auth_service:/app
    networks:
      - faberge_network

networks:
  faberge_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_postgres_data:
  keycloak_data: