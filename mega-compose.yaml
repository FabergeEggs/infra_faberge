name: faberge_latest_compose

x-service-defaults: &service-defaults
  pull_policy: always
  expose:
    - "8000"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres:
    image: postgres:16-alpine
    container_name: faberge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faberge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faberge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-faberge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/01-init-multiple-databases.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-faberge} -d ${POSTGRES_DB:-faberge}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: faberge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: faberge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: faberge-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb "local/$$MEDIA_S3_BUCKET" --ignore-existing

  frontend:
    image: ${FRONTEND_IMAGE:-inchanterx/faberge-frontend}:${VERSION:-latest}
    pull_policy: always
    ports:
      - "3000:80"
    depends_on:
      - gateway

  gateway:
    image: ${GATEWAY_IMAGE:-inchanterx/faberge-apigateway}:${VERSION:-latest}
    pull_policy: always
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - project

  auth:
    <<: *service-defaults
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest}
    build:
      context: ${AUTH_BUILD_CONTEXT:-.}
    volumes:
      - ${AUTH_VOLUME:-/dev/null:/dev/null}
    container_name: auth

  project:
    <<: *service-defaults
    image: ${PROJECT_IMAGE:-inchanterx/faberge-project-service}:${VERSION:-latest}
    build:
      context: ${PROJECT_BUILD_CONTEXT:-.}
    volumes:
      - ${PROJECT_VOLUME:-/dev/null:/dev/null}
    container_name: project
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/project_db

  feed:
    <<: *service-defaults
    image: ${FEED_IMAGE:-inchanterx/faberge-feed-service}:${VERSION:-latest}
    build:
      context: ${FEED_BUILD_CONTEXT:-.}
    volumes:
      - ${FEED_VOLUME:-/dev/null:/dev/null}
    container_name: feed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/feed_db
      REDIS_URL: redis://redis:6379/0

  profile:
    <<: *service-defaults
    image: ${PROFILE_IMAGE:-inchanterx/faberge-profile-service}:${VERSION:-latest}
    build:
      context: ${PROFILE_BUILD_CONTEXT:-.}
    volumes:
      - ${PROFILE_VOLUME:-/dev/null:/dev/null}
    container_name: profile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/profile_db

  media:
    <<: *service-defaults
    image: ${MEDIA_IMAGE:-inchanterx/faberge-media-service}:${VERSION:-latest}
    build:
      context: ${MEDIA_BUILD_CONTEXT:-.}
    volumes:
      - ${MEDIA_VOLUME:-/dev/null:/dev/null}
    container_name: media
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
      S3_REGION: ${S3_REGION:-us-east-1}

  response:
    <<: *service-defaults
    image: ${RESPONSE_IMAGE:-inchanterx/faberge-response-service}:${VERSION:-latest}
    build:
      context: ${RESPONSE_BUILD_CONTEXT:-.}
    volumes:
      - ${RESPONSE_VOLUME:-/dev/null:/dev/null}
    container_name: response
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/response_db

volumes:
  postgres_data:
  redis_data:
  minio_data:
