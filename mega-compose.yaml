name: faberge_latest_compose

x-service-defaults: &service-defaults
  pull_policy: always
  expose:
    - "8000"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres:
    image: postgres:16-alpine
    container_name: faberge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faberge
      POSTGRES_USER: faberge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faberge_dev}
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faberge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: faberge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: faberge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: faberge-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb "local/$$MEDIA_S3_BUCKET" --ignore-existing

  postgres_keycloak:
    image: postgres:15-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - faberge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres_keycloak
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8080"
    depends_on:
      postgres_keycloak:
        condition: service_healthy
      auth-init:
        condition: service_completed_successfully
    volumes:
      - ${KEYCLOAK_EXPORT_VOLUME:-keycloak_shared_export:/opt/keycloak/data/import:ro}
      - keycloak_data:/opt/keycloak/data
    networks:
      - faberge_network

  gateway:
    image: ${GATEWAY_IMAGE:-inchanterx/faberge-apigateway}:${VERSION:-latest}
    pull_policy: always
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - project

  frontend:
    image: ${FRONTEND_IMAGE:-inchanterx/faberge-frontend}:${VERSION:-latest}
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-.}
    volumes:
      - ${FRONTEND_VOLUME:-/dev/null:/dev/null}
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  auth-init:
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest}
    container_name: auth-init
    restart: "no"
    command:
      [
        "sh",
        "-c",
        "cp -r /app/keycloak-export/* /shared-export/ 2>/dev/null || true",
      ]
    volumes:
      - keycloak_shared_export:/shared-export

  auth:
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest} # aaa
    build:
      context: ${AUTH_BUILD_CONTEXT:-.}
    container_name: auth
    restart: unless-stopped
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-service}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-nmeYwMzWRHuLb7V5iCnF9T8vQ2TlW3af}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-auth-service}
    pull_policy: always
    ports:
      - "8001:8000"
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ${AUTH_VOLUME:-/dev/null:/dev/null}
    networks:
      - faberge_network

  project:
    <<: *service-defaults
    image: ${PROJECT_IMAGE:-inchanterx/faberge-project-service}:${VERSION:-latest}
    build:
      context: ${PROJECT_BUILD_CONTEXT:-.}
    volumes:
      - ${PROJECT_VOLUME:-/dev/null:/dev/null}
    container_name: project
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/project_db

  feed:
    <<: *service-defaults
    image: ${FEED_IMAGE:-inchanterx/faberge-feed-service}:${VERSION:-latest}
    build:
      context: ${FEED_BUILD_CONTEXT:-.}
    volumes:
      - ${FEED_VOLUME:-/dev/null:/dev/null}
    container_name: feed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/feed_db
      REDIS_URL: redis://redis:6379/0

  profile:
    <<: *service-defaults
    image: ${PROFILE_IMAGE:-inchanterx/faberge-profile-service}:${VERSION:-latest}
    build:
      context: ${PROFILE_BUILD_CONTEXT:-.}
    volumes:
      - ${PROFILE_VOLUME:-/dev/null:/dev/null}
    container_name: profile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/profile_db

  media:
    <<: *service-defaults
    image: ${MEDIA_IMAGE:-inchanterx/faberge-media-service}:${VERSION:-latest}
    build:
      context: ${MEDIA_BUILD_CONTEXT:-.}
    volumes:
      - ${MEDIA_VOLUME:-/dev/null:/dev/null}
    container_name: media
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
      S3_REGION: ${S3_REGION:-us-east-1}

  response:
    <<: *service-defaults
    image: ${RESPONSE_IMAGE:-inchanterx/faberge-response-service}:${VERSION:-latest}
    build:
      context: ${RESPONSE_BUILD_CONTEXT:-.}
    volumes:
      - ${RESPONSE_VOLUME:-/dev/null:/dev/null}
    container_name: response
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faberge}:${POSTGRES_PASSWORD:-faberge_dev}@postgres:5432/response_db

networks:
  faberge_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_postgres_data:
  keycloak_data:
  keycloak_shared_export:
