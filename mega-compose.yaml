name: faberge_latest_compose

x-service-defaults: &service-defaults
  pull_policy: always
  platform: linux/amd64
  expose:
    - "8000"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: faberge-postgres-auth
    environment:
      POSTGRES_USER: ${POSTGRES_USER_AUTH}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_AUTH}
      POSTGRES_DB: ${POSTGRES_DB_AUTH}
    ports:
      - "${POSTGRES_PORT_AUTH}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./postgres/auth_service/init_auth_db.sh:/docker-entrypoint-initdb.d/init_auth_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_AUTH} -d ${POSTGRES_DB_AUTH}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-keycloak:
    image: postgres:15-alpine
    container_name: faberge-postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_KEYCLOAK:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER_KEYCLOAK:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_KEYCLOAK:-keycloak_password}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_KEYCLOAK:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-media:
    image: postgres:16-alpine
    container_name: faberge-postgres-media
    environment:
      POSTGRES_USER: ${POSTGRES_USER_MEDIA}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_MEDIA}
      POSTGRES_DB: ${POSTGRES_DB_MEDIA}
    ports:
      - "${POSTGRES_PORT_MEDIA}:5432"
    volumes:
      - postgres_media_data:/var/lib/postgresql/data
      - ./postgres/media_service/init_media_db.sh:/docker-entrypoint-initdb.d/init_media_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_MEDIA} -d ${POSTGRES_DB_MEDIA}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-feed:
    image: postgres:16-alpine
    container_name: faberge-postgres-feed
    environment:
      POSTGRES_USER: ${POSTGRES_USER_FEED}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_FEED}
      POSTGRES_DB: ${POSTGRES_DB_FEED}
    ports:
      - "${POSTGRES_PORT_FEED}:5432"
    volumes:
      - postgres_feed_data:/var/lib/postgresql/data
      - ./postgres/feed_service/init_feed_db.sh:/docker-entrypoint-initdb.d/init_feed_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_FEED} -d ${POSTGRES_DB_FEED}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-profile:
    image: postgres:16-alpine
    container_name: faberge-postgres-profile
    environment:
      POSTGRES_USER: ${POSTGRES_USER_PROFILE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PROFILE}
      POSTGRES_DB: ${POSTGRES_DB_PROFILE}
    ports:
      - "${POSTGRES_PORT_PROFILE}:5432"
    volumes:
      - postgres_profile_data:/var/lib/postgresql/data
      - ./postgres/profile_service/init_profile_db.sh:/docker-entrypoint-initdb.d/init_profile_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_PROFILE} -d ${POSTGRES_DB_PROFILE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-project:
    image: postgres:16-alpine
    container_name: faberge-postgres-project
    environment:
      POSTGRES_USER: ${POSTGRES_USER_PROJECT}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PROJECT}
      POSTGRES_DB: ${POSTGRES_DB_PROJECT}
    ports:
      - "${POSTGRES_PORT_PROJECT}:5432"
    volumes:
      - postgres_project_data:/var/lib/postgresql/data
      - ./postgres/project_service/init_project_db.sh:/docker-entrypoint-initdb.d/init_project_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_PROJECT} -d ${POSTGRES_DB_PROJECT}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-response:
    image: postgres:16-alpine
    container_name: faberge-postgres-response
    environment:
      POSTGRES_USER: ${POSTGRES_USER_RESPONSE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_RESPONSE}
      POSTGRES_DB: ${POSTGRES_DB_RESPONSE}
    ports:
      - "${POSTGRES_PORT_RESPONSE}:5432"
    volumes:
      - postgres_response_data:/var/lib/postgresql/data
      - ./postgres/response_service/init_response_db.sh:/docker-entrypoint-initdb.d/init_response_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_RESPONSE} -d ${POSTGRES_DB_RESPONSE}"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    container_name: faberge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: faberge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: faberge-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb "local/$$MEDIA_S3_BUCKET" --ignore-existing




  auth-init:
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest}
    platform: linux/amd64
    pull_policy: always
    container_name: auth-init
    restart: "no"
    command:
      - "sh"
      - "-c"
      - "cp -r /app/keycloak-export/* /shared-export/ 2>/dev/null || true"
    volumes:
      - keycloak_shared_export:/shared-export

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auth_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres-keycloak
      KC_DB_URL_DATABASE: ${POSTGRES_DB_KEYCLOAK:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER_KEYCLOAK:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD_KEYCLOAK:-keycloak_password}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
      auth-init:
        condition: service_completed_successfully
    volumes:
      - ${KEYCLOAK_EXPORT_VOLUME:-keycloak_shared_export}:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s




  auth:
    platform: linux/amd64
    image: ${AUTH_IMAGE:-inchanterx/faberge-auth-service}:${VERSION:-latest}
    build:
      context: ${AUTH_BUILD_CONTEXT:-.}
    container_name: auth
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8001:8000"
    volumes:
      - ${AUTH_VOLUME:-/dev/null:/dev/null}
    depends_on:
      postgres-auth:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER_AUTH}:${POSTGRES_PASSWORD_AUTH}@postgres-auth:5432/${POSTGRES_DB_AUTH}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-service}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-myrealm}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-auth-service}

  project:
    <<: *service-defaults
    image: ${PROJECT_IMAGE:-inchanterx/faberge-project-service}:${VERSION:-latest}
    build:
      context: ${PROJECT_BUILD_CONTEXT:-.}
    volumes:
      - ${PROJECT_VOLUME:-/dev/null:/dev/null}
    container_name: project
    depends_on:
      postgres-project:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER_PROJECT}:${POSTGRES_PASSWORD_PROJECT}@postgres-project:5432/${POSTGRES_DB_PROJECT}

  feed:
    <<: *service-defaults
    image: ${FEED_IMAGE:-inchanterx/faberge-feed-service}:${VERSION:-latest}
    build:
      context: ${FEED_BUILD_CONTEXT:-.}
    volumes:
      - ${FEED_VOLUME:-/dev/null:/dev/null}
    container_name: feed
    healthcheck:
      disable: true
    depends_on:
      postgres-feed:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER_FEED}:${POSTGRES_PASSWORD_FEED}@postgres-feed:5432/${POSTGRES_DB_FEED}
      REDIS_URL: redis://redis:6379/0

  profile:
    <<: *service-defaults
    image: ${PROFILE_IMAGE:-inchanterx/faberge-profile-service}:${VERSION:-latest}
    build:
      context: ${PROFILE_BUILD_CONTEXT:-.}
    volumes:
      - ${PROFILE_VOLUME:-/dev/null:/dev/null}
    container_name: profile
    depends_on:
      postgres-profile:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER_PROFILE}:${POSTGRES_PASSWORD_PROFILE}@postgres-profile:5432/${POSTGRES_DB_PROFILE}

  media:
    <<: *service-defaults
    image: ${MEDIA_IMAGE:-inchanterx/faberge-media-service}:${VERSION:-latest}
    build:
      context: ${MEDIA_BUILD_CONTEXT:-.}
    volumes:
      - ${MEDIA_VOLUME:-/dev/null:/dev/null}
    container_name: media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/media/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-media:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MEDIA_S3_BUCKET:-media}
      S3_REGION: ${S3_REGION:-us-east-1}

  response:
    <<: *service-defaults
    image: ${RESPONSE_IMAGE:-inchanterx/faberge-response-service}:${VERSION:-latest}
    build:
      context: ${RESPONSE_BUILD_CONTEXT:-.}
    volumes:
      - ${RESPONSE_VOLUME:-/dev/null:/dev/null}
    container_name: response
    depends_on:
      postgres-response:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER_RESPONSE}:${POSTGRES_PASSWORD_RESPONSE}@postgres-response:5432/${POSTGRES_DB_RESPONSE}




  gateway:
    image: ${GATEWAY_IMAGE:-inchanterx/faberge-apigateway}:${VERSION:-latest}
    platform: linux/amd64
    pull_policy: always
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - project

  frontend:
    image: ${FRONTEND_IMAGE:-inchanterx/faberge-frontend}:${VERSION:-latest}
    platform: linux/amd64
    pull_policy: always
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-.}
    volumes:
      - ${FRONTEND_VOLUME:-/dev/null:/dev/null}
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_auth_data:
  postgres_keycloak_data:
  postgres_media_data:
  postgres_feed_data:
  postgres_profile_data:
  postgres_project_data:
  postgres_response_data:
  redis_data:
  minio_data:
  keycloak_postgres_data:
  keycloak_data:
  keycloak_shared_export: