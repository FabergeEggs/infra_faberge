name: project_dev_compose
services:
  frontend:
    image: inchanterx/faberge-frontend:develop
    pull_policy: always
    ports:
      - "3000:80"
    depends_on: 
      - gateway

  gateway:
    image: inchanterx/faberge-apigateway:develop
    pull_policy: always
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - project

  auth:
    image: inchanterx/faberge-auth-service:develop
    pull_policy: always
    expose:
    - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  project:
    build: ../project_service
    container_name: project
    volumes:
      - ../project_service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "8000"

  feed:
    image: inchanterx/faberge-feed-service:develop
    pull_policy: always
    expose:
    - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
